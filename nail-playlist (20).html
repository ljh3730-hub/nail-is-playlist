<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAYLIST</title>
<style>
@font-face {
    font-family: 'SMGyeonChul';
    src: url('SM3견출고딕-Regular.otf') format('opentype');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-drag: none; -webkit-user-select: none; }
  body { width: 100vw; height: 100vh; overflow: hidden; font-family: Arial, sans-serif; background: #000; }

  /* ── 랜딩 페이지 ── */
  #landing {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: #000;
    z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.4s ease;
  }
  #landing.fadeout { opacity: 0; pointer-events: none; }

  #landingHint {
    position: absolute;
    bottom: 6%;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.75);
    font-size: 11px;
    letter-spacing: 0.25em;
    font-family: Arial, sans-serif;
    cursor: pointer;
    z-index: 10;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 10px 28px;
    transition: all 0.2s;
  }
  #landingHint:hover { background: rgba(255,255,255,0.1); }

  /* 아이폰 목업 */
  .iphone-mockup {
    position: relative;
    height: 90vh;
    width: auto;
    aspect-ratio: 5376 / 3584;
  }
  .iphone-mockup .iphone-frame-img {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
  }
  /* 영상이 들어갈 화면 영역 — mock1.png 분석 기반 */
  .iphone-screen {
    position: absolute;
    top: 6.14%;
    left: 35.51%;
    width: 28.83%;   /* 64.34% - 35.51% */
    height: 87.72%;  /* 93.86% - 6.14% */
    overflow: hidden;
    background: #000;
    z-index: 1;
    border-radius: 12px;
  }
  .iphone-screen video {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* ── 손 화면 ── */
  #handScreen {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: #fff;
    z-index: 8888;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  #handScreen.visible {
    opacity: 1;
    pointer-events: all;
  }
  #handImg {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    pointer-events: none;
  }

  /* 손톱 클릭 영역 */
  .nail-zone {
    position: absolute;
    width: 60px; height: 60px;
    transform: translate(-50%, -50%);
    cursor: pointer;
    border-radius: 50%;
  }
  /* 호버 하이라이트 — 은은한 빛 */
  .nail-zone::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 70px; height: 70px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,240,200,0.7) 0%, rgba(255,220,120,0.3) 50%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .nail-zone:hover::after { opacity: 1; }
  .nail-zone:hover { animation: nailPulse 1s ease infinite; }

  @keyframes nailPulse {
    0%, 100% { filter: drop-shadow(0 0 6px rgba(255,230,150,0.6)); }
    50%       { filter: drop-shadow(0 0 14px rgba(255,220,80,0.9)); }
  }

  /* ── 줌인 오버레이 ── */
  #zoomOverlay {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: #fff;
    z-index: 9000;
    opacity: 0;
    pointer-events: none;
    overflow: hidden;
    transition: opacity 0.25s ease;
  }
  #zoomOverlay.active { pointer-events: all; }
  #zoomCanvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* ── 메인 앱 ── */
  #app {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0; transition: opacity 0.4s ease; pointer-events: none;
  }
  #app.visible { opacity: 1; pointer-events: all; }

  #panel-left {
    position: absolute; top: 0; left: 0; width: 50%; height: 100%;
    background: #000; cursor: ew-resize;
    display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
  }
  #panel-right {
    position: absolute; top: 0; right: 0; width: 50%; height: 100%;
    background: #fff; cursor: default; overflow-y: auto; overflow-x: hidden; padding-bottom: 80px;
  }

  #clipperImg {
    position: absolute; width: 35%; height: auto; left: 50%; top: -60%;
    transform: translateX(-50%); z-index: 20; pointer-events: none;
    transition: top 0.5s cubic-bezier(0.77,0,0.175,1); visibility: hidden;
  }
  #clipperImg.visible { visibility: visible; top: -5%; }

  #biteImg {
    position: fixed; width: 40vw; height: auto; left: 50%; bottom: -100vh;
    transform: translateX(-50%); z-index: 999; pointer-events: none;
    transition: bottom 0.6s cubic-bezier(0.33,1,0.68,1); visibility: hidden;
  }
  #biteImg.visible { visibility: visible; bottom: -5vh; }

  @keyframes chew {
    0%{transform:translateY(0);} 10%{transform:translateY(-12px);}
    20%{transform:translateY(6px);} 30%{transform:translateY(-10px);}
    40%{transform:translateY(5px);} 50%{transform:translateY(-8px);}
    60%{transform:translateY(4px);} 70%{transform:translateY(-5px);}
    80%{transform:translateY(3px);} 90%{transform:translateY(-2px);}
    100%{transform:translateY(0);}
  }
  @keyframes shakeX {
    0%{transform:translateX(0);} 15%{transform:translateX(-10px);}
    30%{transform:translateX(10px);} 45%{transform:translateX(-8px);}
    60%{transform:translateX(8px);} 75%{transform:translateX(-5px);}
    90%{transform:translateX(5px);} 100%{transform:translateX(0);}
  }
  @keyframes warningPulse { from{opacity:1;} to{opacity:0.4;} }
  body.chew  { animation: chew   0.6s ease; }
  body.shake { animation: shakeX 0.5s ease; }

  #leftBottomBar {
    position: absolute; bottom: 32px; left: 0; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 16px;
    z-index: 10; pointer-events: none;
  }
  .left-btn {
    display: flex; align-items: center; gap: 6px; padding: 10px 20px;
    border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer;
    pointer-events: all; transition: transform 0.1s, opacity 0.1s;
  }
  .left-btn:active { transform: scale(0.95); }
  #biteBtn    { background: #111; color: #fff; border: 1.5px solid #444; }
  #archiveBtn { background: #222; color: #aaa; border: 1.5px solid #444; font-size: 13px; padding: 8px 16px; }
  #clipperBtn { background: #222; color: #fff; border: 1.5px solid #555; }

  #topNav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 1px solid #eee;
    position: sticky; top: 0; background: #fff; z-index: 10;
  }
  #addBtn {
    display: flex; align-items: center; gap: 6px; padding: 8px 20px;
    background: #1db954; color: #fff; border-radius: 24px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background 0.15s, transform 0.1s; pointer-events: all;
  }
  #addBtn:hover  { background: #17a349; }
  #addBtn:active { transform: scale(0.95); }
  #libraryBtn {
    width: 36px; height: 36px; border-radius: 50%; background: #f0f0f0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; transition: background 0.15s;
  }
  #libraryBtn:hover { background: #e0e0e0; }

  #libraryView { display: none; padding: 24px; }
  #libraryView h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #000; }
  .library-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .library-card { cursor: pointer; border-radius: 8px; overflow: hidden; transition: transform 0.15s, box-shadow 0.15s; }
  .library-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
  .library-card-cover { width: 100%; aspect-ratio: 1; border-radius: 8px; margin-bottom: 8px; }
  .library-card-name  { font-size: 13px; font-weight: 600; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .library-card-meta  { font-size: 11px; color: #888; margin-top: 2px; }

  #playlistView { display: block; }
  .pl-header { display: flex; align-items: center; gap: 24px; padding: 40px 40px 24px 40px; border-bottom: 1px solid #eee; }
  .pl-cover  { width: 120px; height: 120px; border-radius: 8px; flex-shrink: 0; }
  .pl-info   { display: flex; flex-direction: column; gap: 6px; }
  .pl-label  { font-size: 12px; color: #888; }
  .pl-title  { font-size: clamp(22px, 3vw, 36px); font-weight: 700; color: #000; line-height: 1.1; }
  .pl-meta   { font-size: 13px; color: #555; margin-top: 4px; }

  #panel-right.fullscreen .pl-header { padding: 48px 60px 32px 60px; gap: 40px; align-items: flex-end; border-bottom: none; }
  #panel-right.fullscreen .pl-cover  { width: 220px; height: 220px; border-radius: 12px; }
  #panel-right.fullscreen .pl-title  { font-size: clamp(28px, 4vw, 52px); }

  .pl-table-header { display: flex; padding: 10px 40px; border-bottom: 1px solid #eee; color: #999; font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase; margin-top: 8px; }
  #panel-right.fullscreen .pl-table-header { display: none; }
  .col-num { width: 40px; text-align: center; }
  .col-title { flex: 1; }
  .col-album { width: 160px; }
  .col-time  { width: 60px; text-align: right; }
  .col-more  { width: 40px; text-align: center; }

  .track-row { display: flex; align-items: center; padding: 10px 40px; border-bottom: 1px solid #f5f5f5; transition: background 0.15s; overflow: hidden; }
  .track-row:hover { background: #f9f9f9; }
  .track-num    { width: 40px; text-align: center; color: #999; font-size: 13px; }
  .track-info   { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .track-name   { font-size: 14px; font-weight: 600; color: #000; }
  .track-artist { font-size: 12px; color: #888; }
  .track-album  { width: 160px; font-size: 13px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-time   { width: 60px; text-align: right; font-size: 13px; color: #666; }
  .track-more   { width: 40px; text-align: center; color: #ccc; font-size: 18px; letter-spacing: 1px; }
  .track-row.skipped { opacity: 0; pointer-events: none; height: 0; padding: 0; border: none; overflow: hidden; }

  #panel-right.fullscreen .track-row    { padding: 14px 60px; }
  #panel-right.fullscreen .track-name   { font-size: 16px; }
  #panel-right.fullscreen .track-artist { display: none; }
  #panel-right.fullscreen .track-album  { display: none; }
  #panel-right.fullscreen .track-time   { font-size: 14px; color: #aaa; }
  #panel-right.fullscreen .track-more   { color: #ddd; font-size: 20px; }

  #archivePanel {
    position: fixed; bottom: -100%; left: 0; width: 50%; height: 70%;
    background: #1a1a1a; border-radius: 20px 20px 0 0; z-index: 200;
    transition: bottom 0.4s cubic-bezier(0.77,0,0.175,1);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #archivePanel.open { bottom: 0; }
  .archive-header { padding: 20px 28px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
  .archive-header h3 { color: #fff; font-size: 18px; font-weight: 700; }
  .archive-close { width: 30px; height: 30px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 14px; }
  .archive-tabs { display: flex; padding: 12px 28px 0; }
  .archive-tab  { padding: 8px 20px; font-size: 13px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
  .archive-tab.active { color: #fff; border-bottom-color: #1db954; }
  .archive-list  { flex: 1; overflow-y: auto; padding: 12px 0; }
  .archive-row   { display: flex; align-items: center; padding: 10px 28px; gap: 12px; border-bottom: 1px solid #2a2a2a; cursor: pointer; transition: background 0.15s; }
  .archive-row:hover { background: #252525; }
  .archive-tag   { font-size: 18px; flex-shrink: 0; }
  .archive-info  { flex: 1; }
  .archive-name  { font-size: 13px; color: #fff; font-weight: 600; }
  .archive-sub   { font-size: 11px; color: #666; margin-top: 2px; }
  .archive-play  { font-size: 11px; color: #1db954; margin-top: 3px; }
  .archive-empty { text-align: center; color: #555; font-size: 13px; padding: 40px 20px; }
</style>
</head>
<body>

<!-- ── 랜딩 페이지 ── -->
<div id="landing">
  <div id="landingText" style="
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-family: 'SMGyeonChul', Arial, sans-serif;
    font-size: 3vh;
    letter-spacing: 0.1em;
    opacity: 0;
    transition: opacity 0.8s ease;
    white-space: nowrap;
    z-index: 2;
  ">손톱 = ?</div>
  <img id="landingTip" src="tip1.png" style="
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    height: 80vh; width: auto;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
    z-index: 1;
  " draggable="false">
</div>

<!-- ── 손 화면 ── -->
<div id="handScreen">
  <img id="handImg" src="hand.png" draggable="false">
  <!-- 손톱 클릭 영역 — 좌표는 hand.png 분석 기반 (object-fit:contain 기준) -->
  <div class="nail-zone" id="nail-pinky"  data-playlist="0" title="새끼"></div>
  <div class="nail-zone" id="nail-ring"   data-playlist="1" title="약지"></div>
  <div class="nail-zone" id="nail-middle" data-playlist="2" title="중지"></div>
  <div class="nail-zone" id="nail-index"  data-playlist="3" title="검지"></div>
  <div class="nail-zone" id="nail-thumb"  data-playlist="4" title="엄지"></div>
</div>

<!-- ── 줌인 오버레이 ── -->
<div id="zoomOverlay">
  <canvas id="zoomCanvas"></canvas>
</div>

<!-- ── 메인 앱 ── -->
<div id="app">
  <div id="panel-left">
    <div id="nailWrap" style="position:relative; height:80vh;">
      <img id="nailImg" src="nail-1.png" style="height:100%; width:auto; pointer-events:none; display:block; mix-blend-mode:multiply;" draggable="false">
      <img id="clipperImg" src="clipper.png" draggable="false">
      <div style="position:absolute; top:15%; left:50%; transform:translateX(-50%); text-align:center; width:55%;">
        <p style="color:#000; font-family:'SMGyeonChul'; font-size:1.6vh; letter-spacing:0.05em; margin-bottom:20px; white-space:nowrap;">슬라이더를 당겨주세요</p>
        <div id="sliderTrack" style="position:relative; width:60%; height:3px; background:#555; margin:0 auto;">
          <div id="sliderFill" style="height:100%; background:#000; width:0%;"></div>
          <div id="sliderThumb" style="position:absolute; top:50%; left:0%; transform:translate(-50%,-50%); width:14px; height:14px; background:#000; border-radius:50%; cursor:grab; pointer-events:all;"></div>
        </div>
      </div>
    </div>
    <div id="leftBottomBar">
      <div class="left-btn" id="biteBtn">👄 Bite</div>
      <div class="left-btn" id="clipperBtn">✂️ Clipper</div>
      <div class="left-btn" id="archiveBtn">📦</div>
    </div>
  </div>

  <img id="biteImg" src="bite.png" draggable="false">

  <div id="panel-right">
    <div id="topNav">
      <div id="libraryBtn">🎵</div>
      <div id="addBtn">+ Add</div>
    </div>
    <div id="libraryView">
      <h2>내 라이브러리</h2>
      <div class="library-grid" id="libraryGrid"></div>
    </div>
    <div id="playlistView">
      <div class="pl-header">
        <div class="pl-cover" id="plCover"></div>
        <div class="pl-info">
          <span class="pl-label">플레이리스트</span>
          <div class="pl-title" id="plTitle">플레이리스트 #1</div>
          <div class="pl-meta" id="trackCount">0곡</div>
        </div>
      </div>
      <div class="pl-table-header">
        <div class="col-num">#</div>
        <div class="col-title">제목</div>
        <div class="col-album">앨범</div>
        <div style="width:160px; font-size:12px;">추가한 날짜</div>
        <div class="col-time">시간</div>
        <div class="col-more"></div>
      </div>
      <div id="trackList"></div>
    </div>
  </div>

  <div id="archivePanel">
    <div class="archive-header">
      <h3>📦 Archive</h3>
      <div class="archive-close" id="archiveClose">✕</div>
    </div>
    <div class="archive-tabs">
      <div class="archive-tab active" data-tab="cut">✂️ 정리된 기억</div>
    </div>
    <div class="archive-list" id="archiveList"></div>
  </div>
</div>

<script>
  // ══════════════════════════════
  // 랜딩 — 텍스트 → 이미지 → 앱
  // ══════════════════════════════
  const landing    = document.getElementById('landing');
  const landingText = document.getElementById('landingText');
  const landingTip  = document.getElementById('landingTip');
  const app        = document.getElementById('app');

  function goToApp() {
    if (landing.dataset.done) return;
    landing.dataset.done = '1';
    landing.classList.add('fadeout');
    app.classList.add('visible');
    setTimeout(() => { landing.style.display = 'none'; }, 450);
  }

  // 1. 텍스트 페이드인
  setTimeout(() => {
    landingText.style.opacity = '1';
  }, 300);

  // 2. 텍스트 페이드아웃 + 이미지 페이드인
  setTimeout(() => {
    landingText.style.opacity = '0';
    landingTip.style.opacity  = '1';
  }, 1800);

  // 3. 앱으로 전환
  setTimeout(goToApp, 3800);

  function goToAppFromZoom(playlistIndex) {
    currentPlaylist = playlists[playlistIndex];
    plCover.style.background = currentPlaylist.color;
    plTitle.textContent = currentPlaylist.name;
    allTracks = []; currentStep = 0;
    applyStep(0);
    app.classList.add('visible');
  }

  // ══════════════════════════════
  // 손톱 영역 위치 계산
  // object-fit: contain 기준으로 실제 렌더 위치 계산
  // ══════════════════════════════
  const HAND_NATURAL_W = 5376;
  const HAND_NATURAL_H = 3584;

  // 각 손톱 위치 (원본 이미지 비율)
  const nailPositions = {
    'nail-pinky':  { x: 0.438, y: 0.390 },
    'nail-ring':   { x: 0.487, y: 0.330 },
    'nail-middle': { x: 0.535, y: 0.305 },
    'nail-index':  { x: 0.582, y: 0.320 },
    'nail-thumb':  { x: 0.632, y: 0.445 },
  };

  function positionNailZones() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // object-fit: contain 렌더 영역 계산
    const imgRatio = HAND_NATURAL_W / HAND_NATURAL_H;
    const screenRatio = vw / vh;
    let renderW, renderH, offsetX, offsetY;

    if (screenRatio > imgRatio) {
      renderH = vh;
      renderW = vh * imgRatio;
      offsetX = (vw - renderW) / 2;
      offsetY = 0;
    } else {
      renderW = vw;
      renderH = vw / imgRatio;
      offsetX = 0;
      offsetY = (vh - renderH) / 2;
    }

    Object.entries(nailPositions).forEach(([id, pos]) => {
      const el = document.getElementById(id);
      if (!el) return;
      const px = offsetX + pos.x * renderW;
      const py = offsetY + pos.y * renderH;
      el.style.left = px + 'px';
      el.style.top  = py + 'px';
    });
  }

  window.addEventListener('resize', positionNailZones);

  // ══════════════════════════════
  // 손톱 클릭 → 캔버스 줌인 → 앱 전환
  // ══════════════════════════════
  const zoomOverlay = document.getElementById('zoomOverlay');
  const zoomCanvas  = document.getElementById('zoomCanvas');
  const zoomCtx     = zoomCanvas.getContext('2d');

  // hand.png 미리 로드
  const handImgEl = new Image();
  handImgEl.src = 'hand.png';

  document.querySelectorAll('.nail-zone').forEach(zone => {
    zone.addEventListener('click', () => {
      const playlistIndex = parseInt(zone.dataset.playlist);
      const pos = nailPositions[zone.id];
      startZoomIn(pos.x, pos.y, playlistIndex);
    });
  });

  function getHandRenderRect() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const imgRatio = HAND_NATURAL_W / HAND_NATURAL_H;
    const screenRatio = vw / vh;
    let rw, rh, ox, oy;
    if (screenRatio > imgRatio) {
      rh = vh; rw = vh * imgRatio;
      ox = (vw - rw) / 2; oy = 0;
    } else {
      rw = vw; rh = vw / imgRatio;
      ox = 0; oy = (vh - rh) / 2;
    }
    return { rw, rh, ox, oy };
  }

  function startZoomIn(originX, originY, playlistIndex) {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    zoomCanvas.width  = vw;
    zoomCanvas.height = vh;

    const { rw, rh, ox, oy } = getHandRenderRect();
    // 클릭한 손톱의 화면 좌표
    const cx = ox + originX * rw;
    const cy = oy + originY * rh;

    zoomOverlay.style.opacity = '0';
    zoomOverlay.classList.add('active');
    zoomOverlay.style.display = 'block';

    const startTime = performance.now();
    const duration  = 650; // ms
    const maxScale  = 12;

    function drawFrame(now) {
      const t = Math.min((now - startTime) / duration, 1);
      // easeInCubic
      const ease = t * t * t;
      const scale = 1 + (maxScale - 1) * ease;

      zoomCtx.clearRect(0, 0, vw, vh);
      zoomCtx.save();
      // cx,cy 기준으로 확대
      zoomCtx.translate(cx, cy);
      zoomCtx.scale(scale, scale);
      zoomCtx.translate(-cx, -cy);
      // 흰 배경 (PNG 투명 제거)
      zoomCtx.fillStyle = '#fff';
      zoomCtx.fillRect(0 - cx / scale, 0 - cy / scale, vw / scale + cx / scale * 2, vh / scale + cy / scale * 2);
      // hand 이미지 렌더
      if (handImgEl.complete) {
        zoomCtx.drawImage(handImgEl, ox, oy, rw, rh);
      }
      zoomCtx.restore();

      // 오버레이 페이드인
      zoomOverlay.style.opacity = Math.min(t * 3, 1).toString();

      if (t < 1) {
        requestAnimationFrame(drawFrame);
      } else {
        // 앱 전환
        goToAppFromZoom(playlistIndex);

        // 오버레이 페이드아웃
        zoomOverlay.style.transition = 'opacity 0.3s ease';
        zoomOverlay.style.opacity = '0';
        setTimeout(() => {
          zoomOverlay.classList.remove('active');
          zoomOverlay.style.display = 'none';
          zoomOverlay.style.transition = '';
        }, 350);
      }
    }

    requestAnimationFrame(drawFrame);
  }

  const songDates = {};
  function getSongDate(song) {
    if (!songDates[song]) {

      const end   = new Date(2026, 3, 15);
      const d = new Date(start.getTime() + Math.random() * (end.getTime() - start.getTime()));
      songDates[song] = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
    }
    return songDates[song];
  }

  function explodeNailPieces() {
    const cx = window.innerWidth * 0.5;
    const cy = window.innerHeight * 0.5;
    for (let i = 0; i < 24; i++) {
      const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      const w = 60 + Math.random() * 80;
      svg.setAttribute('width', w); svg.setAttribute('height', w*0.5); svg.setAttribute('viewBox','0 0 60 30');
      svg.style.cssText = `position:fixed; pointer-events:none; z-index:1000; left:${cx}px; top:${cy}px; opacity:1;`;
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d','M 2 28 Q 30 2 58 28 Q 30 20 2 28 Z');
      const colors = ['#f0e8d8','#e8dcc8','#ddd0bc','#f5efe2','#ece0cc'];
      path.setAttribute('fill', colors[Math.floor(Math.random()*colors.length)]);
      svg.appendChild(path); document.body.appendChild(svg);
      const initRot = Math.random()*360;
      svg.style.transform = `rotate(${initRot}deg)`;
      const angle = (i/24)*360 + Math.random()*25;
      const dist  = 300 + Math.random()*700;
      const tx = Math.cos(angle*Math.PI/180)*dist;
      const ty = Math.sin(angle*Math.PI/180)*dist;
      const rot = initRot + Math.random()*540 - 270;
      const dur = 0.5 + Math.random()*0.5;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        svg.style.transition = `transform ${dur}s cubic-bezier(0.15,0,0.85,1), opacity ${dur*0.6}s ease ${dur*0.4}s`;
        svg.style.transform  = `translate(${tx}px,${ty}px) rotate(${rot}deg)`;
        svg.style.opacity    = '0';
      }));
      setTimeout(() => svg.remove(), 1400);
    }
  }

  function applyStep(step) {
    step = Math.max(0, Math.min(10, step));
    currentStep = step;
    sliderFill.style.width = (step/10*100) + '%';
    sliderThumb.style.left = (step/10*100) + '%';
    nailImg.src = currentPlaylist.nailPrefix + '-' + step + '.png';
    while (allTracks.length < step) {
      const idx = allTracks.length;
      allTracks.push({ num: idx+1, track: currentPlaylist.tracks[idx], visible: true });
    }
    while (allTracks.length > step) allTracks.pop();
    renderTracks();
    const existing = document.getElementById('nailWarning');
    if (step === 10) {
      if (!existing) {
        const warn = document.createElement('div');
        warn.id = 'nailWarning';
        warn.style.cssText = 'position:absolute; top:2%; left:50%; transform:translateX(-50%); color:#ff2020; font-family:Arial,sans-serif; font-size:2vh; white-space:nowrap; z-index:30; pointer-events:none; animation:warningPulse 0.8s ease infinite alternate;';

      }
    } else {
      if (existing) existing.remove();
    }
  }

  function doCut() {
    const visible = allTracks.filter(t => t.visible);

  function renderArchive() {
    archiveList.innerHTML = archiveCut.length === 0

  }

  const panelLeft = document.getElementById('panel-left');
  let leftPct = 50, dragStartX = null, dragStartPct = null, dragging = false;

  function setPanels(pct, animated) {
    pct = Math.max(0, Math.min(100, pct));
    const t = animated ? 'width 0.4s cubic-bezier(0.77,0,0.175,1)' : 'none';
    panelLeft.style.transition  = t;
    panelRight.style.transition = t;
    panelLeft.style.width  = pct + '%';
    panelRight.style.width = (100-pct) + '%';
    leftPct = pct;
    if (pct === 0) { panelRight.classList.add('fullscreen'); archivePanel.style.left='0'; archivePanel.style.width='100%'; }
    else           { panelRight.classList.remove('fullscreen'); archivePanel.style.left='0'; archivePanel.style.width='50%'; }
  }

  function dragStart(clientX) { dragStartX = clientX; dragStartPct = leftPct; dragging = true; }
  function dragMove(clientX)  { if (!dragging) return; setPanels(dragStartPct + (clientX-dragStartX)/window.innerWidth*100, false); }
  function dragEnd()          { if (!dragging) return; dragging=false; if(leftPct<25) setPanels(0,true); else if(leftPct<75) setPanels(50,true); else setPanels(100,true); }

  const sliderTrack = document.getElementById('sliderTrack');
  let draggingSlider = false;
  sliderThumb.addEventListener('mousedown', e => { draggingSlider=true; e.stopPropagation(); });
  document.addEventListener('mousemove', e => {
    if (draggingSlider) { const r=sliderTrack.getBoundingClientRect(); applyStep(Math.round(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*10)); }
    else if (dragging)  { dragMove(e.clientX); }
  });
  document.addEventListener('mouseup', () => { if(draggingSlider) draggingSlider=false; else dragEnd(); });
  panelLeft.addEventListener('mousedown',  e => { if(!draggingSlider) dragStart(e.clientX); });
  panelRight.addEventListener('mousedown', e => { if(!draggingSlider) dragStart(e.clientX); });
  panelLeft.addEventListener('touchstart',  e => dragStart(e.touches[0].clientX), {passive:true});
  panelRight.addEventListener('touchstart', e => dragStart(e.touches[0].clientX), {passive:true});
  document.addEventListener('touchmove',    e => dragMove(e.touches[0].clientX),  {passive:true});
  document.addEventListener('touchend',     dragEnd);
